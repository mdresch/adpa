name: Queue Service Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/src/services/jobs/**'
      - 'server/src/__tests__/services/jobs/**'
      - '.github/workflows/queue-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/src/services/jobs/**'
      - 'server/src/__tests__/services/jobs/**'
      - '.github/workflows/queue-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Queue Service Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: adpa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Install dependencies
        run: |
          pnpm install

      - name: Run unit tests
        run: |
          pnpm test:queue-service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adpa_test
          REDIS_URL: redis://localhost:6379

      - name: Run adapter tests
        run: |
          pnpm test:queue-adapters
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adpa_test
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: |
          pnpm test:queue-integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adpa_test
          REDIS_URL: redis://localhost:6379

      - name: Run all queue tests with coverage
        run: |
          pnpm test:queue-all -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adpa_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage/lcov.info
          flags: queue-service
          name: queue-service-coverage
          fail_ci_if_error: false

  load-test:
    name: Load Testing (1000+ jobs)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[load-test]')
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: adpa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Run load tests
        run: |
          cd server
          npm run test -- server/src/__tests__/services/jobs/queue/load-test.ts --verbose
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/adpa_test
          REDIS_URL: redis://localhost:6379
          SKIP_STUCK_JOB_CHECK: 'true'

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: |
            server/coverage/
            server/logs/
