name: Trigger auto deployment for adpa-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ adpa-project-charter ]
    paths:
    - '**'
    - '.github/workflows/adpa-backend-AutoDeployTrigger-98955884-fa54-44c8-a274-42ad927a81a8.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ADPABACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ADPABACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ADPABACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/server
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: adparepo.azurecr.io
          registryUsername: ${{ secrets.ADPABACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ADPABACKEND_REGISTRY_PASSWORD }}
          containerAppName: adpa-backend
          resourceGroup: rg-ADPA
          imageToBuild: adparepo.azurecr.io/adpa-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


