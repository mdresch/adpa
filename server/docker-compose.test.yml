version: '3.8'
services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: adpa_test_db
    ports:
      - "5433:5432"  # Non-standard to avoid dev env collision
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d adpa_test_db"]
      interval: 2s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # Ephemeral storage for speed
