version: '3.8'
services:
  postgres-test:
    image: postgres:15-alpine
    container_name: adpa-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: adpa_test_db
    ports:
      - "5433:5432"  # Non-standard to avoid dev env collision
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./schema-dev.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data-seed.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d adpa_test_db"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
