<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>{{title}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        @page {
            margin: 2.5cm 2cm;

            @bottom-center {
                content: "Page " counter(page) " of " counter(pages);
                font-family: 'Inter', sans-serif;
                font-size: 9pt;
                color: #666;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: #111;
            font-weight: 700;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            page-break-after: avoid;
        }

        h1 {
            font-size: 24pt;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 0.3em;
            margin-top: 0;
        }

        h2 {
            font-size: 18pt;
        }

        h3 {
            font-size: 14pt;
        }

        p {
            margin-bottom: 1em;
        }

        a {
            color: #2563eb;
            text-decoration: none;
        }

        code {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: #f5f5f5;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre {
            background-color: #f5f5f5;
            padding: 1em;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 1em;
            page-break-inside: avoid;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }

        blockquote {
            border-left: 4px solid #e5e7eb;
            margin: 0;
            padding-left: 1em;
            color: #666;
            font-style: italic;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
            font-size: 0.9em;
            page-break-inside: avoid;
        }

        th,
        td {
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background-color: #f9fafb;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #fdfdfd;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1em auto;
            border-radius: 4px;
        }

        ul,
        ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }

        li {
            margin-bottom: 0.5em;
        }

        /* Cover Page Styling (Optional) */
        .cover-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            page-break-after: always;
        }

        .cover-title {
            font-size: 32pt;
            margin-bottom: 0.5em;
        }

        .cover-meta {
            font-size: 14pt;
            color: #666;
        }

        .header-meta {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 2em;
            border-bottom: 1px solid #eee;
            padding-bottom: 1em;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="header-meta">
        <span>Generated by ADPA</span>
        <span>{{date}}</span>
    </div>

    <h1>{{title}}</h1>

    <div class="content">
        {{{content}}}
    </div>
</body>

</html>
