version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: adpa-postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: adpa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Direct PostgreSQL connection, bypasses PgBouncer
      - "5432:5432"
  
  morphic-db:
    image: postgres:17-alpine
    container_name: adpa-morphic_db
    restart: always
    environment:
      POSTGRES_USER: morphic_user
      POSTGRES_PASSWORD: morphic_password
      POSTGRES_DB: morphic
    volumes:
      - morphic_data:/var/lib/postgresql/data
      - ./server/morphic-init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: adpa-pgbouncer
    restart: always
    environment:
      # Database access details pointing to the postgres service
      DB_HOST: postgres
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: adpa

      # Connection pooler parameters
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
    ports:
      # Connections to this port will go through the pooler
      - "6432:5432"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: adpa-redis_cache
    restart: always
    # Enable snapshotting for persistence (saves every 60s if at least 1 key changed)
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  rabbitmq:
    # Using the 'management' tag so we get the web UI built-in
    image: rabbitmq:3-management-alpine
    container_name: adpa-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672" # Standard AMQP protocol port for application connections
      - "15672:15672" # RabbitMQ Management Web UI port

  neo4j:
    image: neo4j:enterprise
    container_name: adpa-neo4j_db
    restart: always
    environment:
      NEO4J_AUTH: neo4j/mypassword
      # Accept the Neo4j Enterprise licence for development use
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "eval"
      # NEO4J_apoc_export_file_enabled: true
      # NEO4J_apoc_import_file_enabled: true
      # NEO4J_apoc_import_file_use__neo4j__config: true
      # NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474" # HTTP port (for Neo4j Browser)
      - "7687:7687" # Bolt port (for app connections)

  mongodb:
    image: mongo:6
    container_name: adpa-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mypassword
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017" # Standard MongoDB port

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: adpa-backend
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgres://myuser:mypassword@postgres:5432/adpa
      - MORPHIC_DATABASE_URL=postgres://morphic_user:morphic_password@morphic-db:5432/morphic
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - MONGODB_URI=mongodb://root:mypassword@mongodb:27017/adpa_rag?authSource=admin
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=mypassword
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DATABASE=default
      - JWT_SECRET=adpa-secret-key-change-in-production-2025
      - ENABLE_AUTH=true
      - FAIL_FAST_MODE=false
      - LANGFUSE_BASE_URL=http://langfuse-web:3000
      - LANGFUSE_OTLP_ENDPOINT=http://langfuse-web:3000/api/public/otel/v1/traces
      - LANGFUSE_PUBLIC_KEY=pk-lf-5fc3bd74-750d-4ab7-9560-ed085e2671fb
      - LANGFUSE_SECRET_KEY=sk-lf-a25cc92d-8320-47b0-a554-4e60d8e1f12f
      - PINECONE_API_KEY=pcsk_5vEdP3_NUYZTUwJ8RV8zgSjGwAUTKtAwgTsm7enwDhxwDSZiWfwRRp9wG3Xjsbc9SbvjGT
      - PINECONE_INDEX=adpa-rag-index
      - ADDITIONAL_ALLOWED_ORIGINS=http://localhost:3005
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_started
      morphic-db:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      neo4j:
        condition: service_started
      rabbitmq:
        condition: service_started
      langfuse-clickhouse:
        condition: service_started
      langfuse-web:
        condition: service_started
      langfuse-minio:
        condition: service_started
# frontend service follows...
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: adpa-frontend
    restart: always
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:5000
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
    ports:
      - "3005:3005"
    depends_on:
      - backend

  # Langfuse - Dedicated Observability Stack
  langfuse-db:
    image: postgres:17-alpine
    container_name: adpa-langfuse-postgres
    restart: always
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfusepassword
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5435:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: adpa-langfuse-clickhouse
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhousepassword
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 10s
      timeout: 10s
      retries: 15

  langfuse-redis:
    image: redis:7-alpine
    container_name: adpa-langfuse-redis
    restart: always
    command: --requirepass langfuseredissecret --maxmemory-policy noeviction
    ports:
      - "6380:6379"
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuseredissecret", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-minio:
    image: minio/minio:latest
    container_name: adpa-langfuse-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9090:9000"
      - "9091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-web:
    build:
      context: ./langfuse-repo
      dockerfile: web/Dockerfile
    container_name: adpa-langfuse-web
    restart: always
    ports:
      - "3010:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://langfuse:langfusepassword@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: 4q4fITEnw2FbpivJgqHOxx+Ymb7jsK0QFGNwuCV1gEA=
      SALT: d4HGcObj1lbDw0ItqKeH+VOWICVYoHDyuGyPE1vFAX8=
      ENCRYPTION_KEY: 7b1d118151ac7a7f8659ede465d9e95f1fa3ca4d5258f740a56aef0984f415db
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhousepassword
      CLICKHOUSE_DB: default
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuseredissecret
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_INIT_ORG_NAME: "ADPA"
      LANGFUSE_INIT_PROJECT_NAME: "ADPA Main"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-5fc3bd74-750d-4ab7-9560-ed085e2671fb"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-a25cc92d-8320-47b0-a554-4e60d8e1f12f"
      LANGFUSE_INIT_USER_EMAIL: "admin@adpa.local"
      LANGFUSE_INIT_USER_NAME: "ADPA Admin"
      LANGFUSE_INIT_USER_PASSWORD: "adpapassword123"
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_started
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_started

  langfuse-worker:
    build:
      context: ./langfuse-repo
      dockerfile: worker/Dockerfile
    container_name: adpa-langfuse-worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://langfuse:langfusepassword@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3010
      SALT: d4HGcObj1lbDw0ItqKeH+VOWICVYoHDyuGyPE1vFAX8=
      ENCRYPTION_KEY: 7b1d118151ac7a7f8659ede465d9e95f1fa3ca4d5258f740a56aef0984f415db
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhousepassword
      CLICKHOUSE_DB: default
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuseredissecret
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-7d728ad3-fa0d-4347-9d40-9df1d1acef59"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-cb00b915-01d8-408b-b731-08d4fbdc350e"
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  neo4j_data:
  mongodb_data:
  morphic_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  langfuse_redis_data:
