services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: adpa-postgres
    environment:
      POSTGRES_DB: adpa_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adpa-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: adpa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adpa-network

  # ADPA Backend API
  adpa-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: adpa-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - POSTGRES_URL=postgres://postgres:password@postgres:5432/adpa_db
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=adpa_db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-development-jwt-secret-key-here-make-it-long-and-secure
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adpa-network
    restart: unless-stopped

  # ADPA Frontend
  adpa-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: adpa-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_WS_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - adpa-backend
    networks:
      - adpa-network
    restart: unless-stopped

  # Optional: Redis Commander for Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: adpa-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - adpa-network

  # Optional: pgAdmin for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: adpa-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@adpa.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - adpa-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  adpa-network:
    driver: bridge
