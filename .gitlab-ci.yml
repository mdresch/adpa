# GitLab CI/CD Pipeline for ADPA Framework
# Combines professional GitLab Ultimate templates with ADPA-specific monorepo fixes

image: node:20-slim

stages:
  - test
  - build
  - deploy

variables:
  # Docker Hub details
  DOCKER_IMAGE: $DOCKER_HUB_USERNAME/adpa-backend:latest
  # pnpm optimization
  PNPM_CACHE_DIR: .pnpm-store

# Standard cache configuration for pnpm
cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store
    - node_modules/

# -----------------------------------------------------------------------------
# STAGE: TEST
# -----------------------------------------------------------------------------

lint_frontend:
  stage: test
  before_script:
    - npm install -g pnpm
    - pnpm install --no-frozen-lockfile
  script:
    - pnpm lint
  rules:
    - if: $CI_COMMIT_BRANCH == "adpa-project-charter"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint_backend:
  stage: test
  before_script:
    - npm install -g pnpm
    - pnpm install --no-frozen-lockfile
  script:
    - cd server
    - pnpm lint
  rules:
    - if: $CI_COMMIT_BRANCH == "adpa-project-charter"

# -----------------------------------------------------------------------------
# STAGE: BUILD (The critical fix for Azure)
# -----------------------------------------------------------------------------

build_backend_docker:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
  script:
    # IMPORTANT: We build from the root (.) so Docker can see /lib and /patches
    # But we use the server Dockerfile (-f server/Dockerfile)
    - docker build -t $DOCKER_IMAGE -f server/Dockerfile .
    - docker push $DOCKER_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "adpa-project-charter"

# -----------------------------------------------------------------------------
# STAGE: DEPLOY
# -----------------------------------------------------------------------------

deploy_status:
  stage: deploy
  script:
    - echo "Deployment to Docker Hub successful."
    - echo "Azure Container Apps (Revision 18+) will now pull the new image automatically."
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == "adpa-project-charter"
