# Docker Compose Override for Development
# This file extends the base docker-compose.yml for development purposes
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  # Override backend for development
  adpa-backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - DEBUG=*
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=adpa_db
      - DB_PORT=5432
      - POSTGRES_URL=postgres://postgres:password@postgres:5432/adpa_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-development-jwt-secret-key-here-make-it-long-and-secure
      - FRONTEND_URL=http://localhost:3000
    # Mount the host server source into the container so changes on the host
    # are visible to the dev watcher (tsx watch). Keep node_modules in the
    # container to avoid overwriting installed deps.
    volumes:
      - ./server:/app
      - /app/node_modules
    # Run as root in development to avoid permission issues with mounted volumes
    user: root
    command: npm run dev
    ports:
      - "5000:5000"
      - "9229:9229"  # Debug port

  # Override frontend for development
  adpa-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      # Ensure Next dev listens on all interfaces inside the container so the
      # host can reach it via the forwarded port.
      - HOST=0.0.0.0
      - CI=true
      # Enable polling so file change events are detected reliably when the
      # filesystem is mounted from Windows into the container.
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    # Mount the repo root into /app so Next.js dev server sees file changes.
    # Keep node_modules and .next as container volumes for performance and to
    # avoid host/guest permission problems. Use cached mode for better perf on Mac/Windows.
    volumes:
      - ./:/app:cached
      - /app/node_modules
      - /app/.next
    # Run as root in development to avoid permission issues with mounted volumes
    user: root
    # Start Next in dev mode binding to 0.0.0.0 so the host can access it.
    # Enable corepack and ensure pnpm is available, then install dependencies
    # and start the dev server
    command: "sh -c 'corepack enable && pnpm install --no-frozen-lockfile && pnpm run dev'"
    ports:
      - "3000:3000"
