[variables]
NIXPACKS_NODEJS_VERSION = "20"

[phases.setup]
nixPkgs = ["nodejs_20", "chromium"]

[phases.install]
cmds = [
  "cd server && npm install && npm install handlebars --no-save",
  "export PUPPETEER_EXECUTABLE_PATH=$(which chromium || which chromium-browser || echo '')"
]

[phases.build]
cmds = ["cd server && npm run build || true"]

[start]
cmd = "export PUPPETEER_EXECUTABLE_PATH=$(which chromium || which chromium-browser || echo '') && cd server && npm start"


